spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/messagesdb}
spring.datasource.username=${DB_USERNAME:jeroen}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Artemis
# ActiveMQ
spring.activemq.broker-url=vm://embedded?broker.persistent=false
spring.activemq.in-memory=true
spring.activemq.packages.trusted=com.example.springboot
spring.jms.listener.concurrency=3
spring.jms.listener.max-concurrency=10