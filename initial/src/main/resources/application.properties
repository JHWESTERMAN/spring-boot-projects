# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/messagesdb}
spring.datasource.username=${DB_USERNAME:jeroen}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ActiveMQ
spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin
spring.activemq.in-memory=false
spring.activemq.packages.trusted=com.example.springboot

# JMS listener
spring.jms.listener.concurrency=3
spring.jms.listener.max-concurrency=10