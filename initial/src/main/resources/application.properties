# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/messagesdb}
spring.datasource.username=${DB_USERNAME:jeroen}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ActiveMQ
spring.activemq.broker-url=${ACTIVEMQ_BROKER_URL:failover:(tcp://localhost:61616)?maxReconnectAttempts=10&initialReconnectDelay=500&maxReconnectDelay=5000&useExponentialBackOff=true}
spring.activemq.user=admin
spring.activemq.password=admin
spring.activemq.in-memory=false
spring.activemq.packages.trusted=com.example.springboot

# JMS listener
spring.jms.listener.concurrency=3
spring.jms.listener.max-concurrency=10
# JMS listener reconnect
spring.jms.listener.recovery-interval=2000