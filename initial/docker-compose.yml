services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres-local
    environment:
      POSTGRES_DB: messagesdb
      POSTGRES_USER: jeroen
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeroen -d messagesdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  activemq:
    image: apache/activemq-classic:latest
    container_name: activemq
    ports:
      - "61616:61616"
      - "8161:8161"
    healthcheck:
      test: ["CMD-SHELL", "curl -f -u admin:admin http://localhost:8161/admin || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  spring-boot:
    build: .
    container_name: spring-boot-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/messagesdb
      SPRING_DATASOURCE_USERNAME: jeroen
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_ACTIVEMQ_BROKER_URL: tcp://activemq:61616
      SPRING_ACTIVEMQ_USER: admin
      SPRING_ACTIVEMQ_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
      activemq:
        condition: service_healthy

volumes:
  postgres-data:
