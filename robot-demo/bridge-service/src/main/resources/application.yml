server:
  port: 8090

robot:
  mock:
    url: ws://localhost:9091/

spring:
  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin
  jms:
    pub-sub-domain: false  # queues, geen topics

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    nl.jeroen: INFO
    org.springframework.jms: WARN
