name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: messagesdb
          POSTGRES_USER: jeroen
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean install -f initial/pom.xml
        env:
          DB_URL: jdbc:postgresql://localhost:5432/messagesdb
          DB_USERNAME: jeroen
          DB_PASSWORD: secret

      - name: Build Docker image
        run: docker build -t spring-boot-messages:latest ./initial

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker tag spring-boot-messages:latest ghcr.io/jhwesterman/spring-boot-messages:latest
          docker push ghcr.io/jhwesterman/spring-boot-messages:latest
